apiVersion: apps/v1
kind: Deployment
metadata:
  name: news
spec:
  replicas: 2
  selector:
    matchLabels:
      app: news
  template:
    metadata:
      labels:
        app: news
    spec:
      containers:
      - name: news
        image: aneesh292002/news-app:latest
        ports:
        - containerPort: 5000
        env:
        - name: DB_HOST
          value: "your-rds-endpoint"
        - name: DB_USER
          value: "admin"
        - name: DB_PASSWORD
          value: "Devops123"
        - name: DB_NAME
          value: "newsdb"
