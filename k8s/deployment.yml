apiVersion: apps/v1
kind: Deployment
metadata:
  name: news
spec:
  replicas: 2
  selector:
    matchLabels:
      app: news
  template:
    metadata:
      labels:
        app: news
    spec:
      containers:
      - name: news
        image: aneesh292002/news-app:latest
        ports:
        - containerPort: 5000
      
